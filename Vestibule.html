<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- SheetJS — Excel export (graceful CSV fallback in-app if this fails to load) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Real data (empty init + helpers) -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="data-extended.jsx"></script>

<!-- Demo dataset — stored as window.DEMO_DATA / window.DEMO_DATA_EXTENDED, not auto-loaded -->
<script type="text/babel" src="data-demo.jsx"></script>
<script type="text/babel" src="data-demo-extended.jsx"></script>

<!-- Real permit pull (generated by pull_dob.py — file may not exist yet) -->
<script type="text/babel" src="data-permits.jsx" onerror="void 0"></script>

<!-- Real restaurant pull (generated by enrich_restaurants.py) -->
<script type="text/babel" src="data-restaurants.jsx"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="views/dashboard.jsx"></script>

<script type="text/babel" src="views/briefing.jsx"></script>
