<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Vestibule — Lead Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  /* Standalone shell — the lead dashboard with no app sidebar or extra tabs */
  .leads-main { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .leads-topbar { display: flex; align-items: center; gap: 14px; padding: 0 22px; height: 56px; border-bottom: 1px solid var(--rule); background: var(--paper); white-space: nowrap; }
  .leads-topbar .brand { display: flex; align-items: center; gap: 9px; }
  .leads-topbar .brand h1 { font-family: var(--font-display); font-size: 26px; font-weight: 400; margin: 0; letter-spacing: -0.5px; line-height: 1; }
  .leads-topbar .tag { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-mute); letter-spacing: 0.5px; text-transform: uppercase; border-left: 1px solid var(--rule); padding-left: 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- SheetJS — Excel export (graceful CSV fallback in-app if this fails to load) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Real restaurant pull (generated by enrich_restaurants.py) -->
<script type="text/babel" src="data-restaurants.jsx"></script>

<!-- The one view this page is about -->
<script type="text/babel" src="views/restaurants.jsx"></script>

<!-- Slim standalone shell: brand bar + the lead dashboard, nothing else -->
<script type="text/babel">
function LeadsApp() {
  return (
    <div className="leads-main">
      <div className="leads-topbar">
        <div className="brand">
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
            <rect x="3" y="3" width="18" height="18" stroke="#0F1419" strokeWidth="1.5"/>
            <rect x="9" y="9" width="6" height="12" fill="#0F1419"/>
            <line x1="9" y1="3" x2="9" y2="9" stroke="#0F1419" strokeWidth="1.5"/>
            <line x1="15" y1="3" x2="15" y2="9" stroke="#0F1419" strokeWidth="1.5"/>
          </svg>
          <h1>Vestibule</h1>
        </div>
        <span className="tag">Lead Dashboard · NYC</span>
        <span style={{flex:1}}/>
        <span className="topbar" style={{border:'none', height:'auto', padding:0}}>
          <span className="top-meta">
            <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
              <span style={{width:6, height:6, borderRadius:'50%', background:'var(--green)'}}/>
              DOHMH feed
            </span>
          </span>
        </span>
        <a href="Vestibule.html" className="btn small" style={{textDecoration:'none'}}>Full app →</a>
      </div>
      <RestaurantsView/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LeadsApp/>);
</script>
</body>
</html>
